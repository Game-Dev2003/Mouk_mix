<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>สำหรับ MoukMix 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+Thai:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- PAGE 1 -->
  <div id="page1">
    <div class="question-wrap">
      <div class="sub">a little question for you ♡</div>
      <div class="question">Do you <em>like</em> me?</div>
    </div>

    <div class="buttons">
      <button class="btn-yes" id="btnYes" onclick="onYes()">Yess 🌸</button>
      <button class="btn-no"  id="btnNo"  onclick="onNo()">No</button>
      <div class="no-msg" id="noMsg">ไม่ได้นะ กด Yess เลย 🥺</div>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div id="page2">
    <div class="yay-emoji" id="yayEmoji">🌸</div>
    <div class="yay-title" id="yayTitle">ขอบคุณนะ 🥹</div>
    <p class="yay-msg" id="yayMsg">
      รู้แล้วว่าคุณรู้สึกยังไง<br>
      ผมก็ชอบคุณเหมือนกันนะ<br>
      <em style="font-family:'Cormorant Garamond',serif;font-style:italic;">MoukMix</em> 💌
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
